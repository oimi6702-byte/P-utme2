<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>University CBT - Candidate Exam</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/dist/vision_bundle.mjs" type="module"></script>
    <style>
        :root {
            --primary: #1e3a8a; --primary-light: #2563eb;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg: #f0f4f8; --card: #fff; --text: #1e293b; --text-light: #64748b;
            --border: #e2e8f0; --shadow: 0 4px 24px rgba(0,0,0,0.06); --radius: 14px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; user-select:none; }
        .screen { display:none; min-height:100vh; animation:fadeIn 0.3s ease; }
        .screen.active { display:flex; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

        #candidateLogin { justify-content:center; align-items:center; background:linear-gradient(135deg,#0f172a,#1e3a5f); padding:20px; }
        .login-card { background:var(--card); border-radius:24px; padding:36px 30px; width:100%; max-width:560px; box-shadow:0 25px 50px rgba(0,0,0,0.3); }
        .login-card h1 { text-align:center; font-size:1.6rem; margin-bottom:6px; }
        .login-card .subtitle { text-align:center; color:var(--text-light); margin-bottom:24px; font-size:0.9rem; }
        .form-group { margin-bottom:18px; }
        .form-group label { font-weight:600; font-size:0.85rem; display:block; margin-bottom:5px; }
        .form-group input, .form-group select { width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:10px; font-size:0.95rem; background:#f8fafc; }
        .form-row { display:flex; gap:12px; }
        .form-row .form-group { flex:1; }
        .btn { padding:12px 24px; border-radius:10px; font-weight:600; font-size:0.95rem; cursor:pointer; border:none; transition:0.2s; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
        .btn-primary { background:var(--primary-light); color:#fff; width:100%; box-shadow:0 4px 14px rgba(37,99,235,0.3); }
        .btn-primary:disabled { background:#94a3b8; cursor:not-allowed; box-shadow:none; }
        .btn-outline { background:#fff; border:2px solid var(--primary-light); color:var(--primary-light); }
        .btn-sm { padding:8px 16px; font-size:0.8rem; }

        .multi-select { position:relative; }
        .multi-select .selected-tags { display:flex; flex-wrap:wrap; gap:4px; padding:8px; border:2px solid var(--border); border-radius:10px; background:#fff; min-height:44px; cursor:pointer; }
        .multi-select .tag { background:var(--primary-light); color:#fff; padding:4px 10px; border-radius:20px; font-size:0.8rem; display:flex; align-items:center; gap:4px; }
        .multi-select .tag .remove { cursor:pointer; font-weight:bold; }
        .multi-select .dropdown { position:absolute; top:100%; left:0; right:0; background:#fff; border:2px solid var(--border); border-radius:10px; max-height:220px; overflow-y:auto; z-index:10; display:none; box-shadow:0 8px 20px rgba(0,0,0,0.1); }
        .multi-select .dropdown.open { display:block; }
        .multi-select .search-input { width:100%; padding:10px; border:none; border-bottom:1px solid var(--border); }
        .multi-select .option { padding:10px 14px; display:flex; align-items:center; gap:8px; cursor:pointer; }
        .multi-select .option:hover { background:#f1f5f9; }
        .multi-select .option input { margin:0; }

        .checklist { list-style:none; }
        .checklist li { padding:10px 14px; border-radius:8px; background:#f8fafc; border:1px solid var(--border); margin-bottom:6px; display:flex; align-items:center; gap:10px; }
        .checklist li.passed { background:#f0fdf4; border-color:#bbf7d0; }
        .checklist li.failed { background:#fef2f2; border-color:#fecaca; }
        .camera-preview-box { width:200px; height:150px; margin:0 auto; background:#1e293b; border-radius:12px; overflow:hidden; }

        .exam-topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; background:#fff; border-bottom:1px solid var(--border); gap:10px; }
        .timer { font-weight:700; font-size:1.2rem; }
        .subject-indicator { background:#e0e7ff; padding:4px 12px; border-radius:20px; font-weight:600; font-size:0.85rem; }
        .question-content { padding:24px; flex:1; overflow-y:auto; }
        .subject-header { font-size:1.2rem; font-weight:700; color:var(--primary); margin:20px 0 12px; border-bottom:2px solid var(--border); padding-bottom:8px; }
        .saq-input { width:100%; padding:12px; border:2px solid var(--border); border-radius:10px; margin-top:8px; font-size:0.95rem; }
        .violation-toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#1e293b; color:#fff; padding:12px 24px; border-radius:30px; z-index:2000; display:none; }
        .violation-toast.show { display:block; animation:slideDown 0.3s ease; }

        @media(max-width:768px) { .form-row { flex-direction:column; } }
    </style>
</head>
<body>
    <!-- CANDIDATE LOGIN -->
    <div class="screen active" id="candidateLogin">
        <div class="login-card">
            <h1>🎓 University CBT</h1>
            <p class="subtitle">Secure Examination Platform</p>
            <form id="candidateForm">
                <div class="form-row">
                    <div class="form-group"><label>Full Name</label><input type="text" id="fullName" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                </div>
                <div class="form-group"><label>NIN / Registration Number</label><input type="text" id="nin" required></div>
                <div class="form-group"><label>Phone</label><input type="tel" id="phone" required></div>
                <div class="form-group">
                    <label>Select Subjects (min 3, max 4)</label>
                    <div class="multi-select" id="subjectMultiSelect">
                        <div class="selected-tags" id="subjectTags"><span style="color:#94a3b8;">Click to select subjects...</span></div>
                        <div class="dropdown" id="subjectDropdown">
                            <input type="text" class="search-input" id="subjectSearch" placeholder="Search subjects...">
                            <div id="subjectOptions"></div>
                        </div>
                    </div>
                </div>
                <div class="form-group"><label>Exam PIN</label><input type="password" id="examPin" required></div>
                <button type="submit" class="btn btn-primary" id="btnCandidateLogin">Proceed to Pre‑Exam Check</button>
            </form>
        </div>
    </div>

    <!-- PRE-EXAM CHECK (dynamic) -->
    <div class="screen" id="preExamScreen"></div>

    <!-- EXAM SCREEN -->
    <div class="screen" id="examScreen">
        <div class="exam-topbar">
            <span class="subject-indicator" id="currentSubjectLabel">Mathematics</span>
            <span class="timer" id="examTimer">⏱ 60:00</span>
            <span id="violationCounter">⚠️ 0/3</span>
            <button class="btn btn-sm btn-outline" id="toggleCalculator" style="display:none;">🧮 Calc</button>
        </div>
        <div class="question-content" id="questionContainer"></div>
        <div style="padding:16px; display:flex; gap:8px; justify-content:flex-end;">
            <button class="btn btn-outline btn-sm" id="prevQuestion">◀ Prev</button>
            <button class="btn btn-outline btn-sm" id="nextQuestion">Next ▶</button>
            <button class="btn btn-sm btn-success" id="saveAnswer">💾 Save</button>
            <button class="btn btn-sm btn-danger" id="submitExam">📤 Submit</button>
        </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div class="screen" id="resultsScreen">
        <div style="max-width:600px;margin:40px auto;background:#fff;padding:30px;border-radius:20px;text-align:center;">
            <h2>Exam Submitted</h2>
            <div id="resultsContent"></div>
            <button class="btn btn-primary" onclick="location.reload()">Finish</button>
        </div>
    </div>

    <!-- FLOATING CALCULATOR -->
    <div id="calcFloat" style="position:fixed; top:70px; right:20px; width:250px; background:#fff; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.2); display:none; z-index:1000;">
        <div style="padding:10px;background:#1e293b;color:#fff;display:flex;justify-content:space-between;">
            <span>Calculator</span><span style="cursor:pointer;" id="closeCalc">✕</span>
        </div>
        <div id="calcDisplay" style="padding:16px;text-align:right;font-size:1.3rem;border-bottom:1px solid #eee;">0</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);" id="calcButtons"></div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/dist/vision_bundle.mjs';

        const VALID_PIN = 'CBT2024';
        const MAX_VIOLATIONS = 3;
        const EXAM_DURATION_SEC = 60 * 60;

        const questionBank = {
            "Mathematics": [
                { id:1, type:"mcq", text:"Solve for x: 2x + 5 = 15", options:["5","6","10","7"], correct:1 },
                { id:2, type:"mcq", text:"What is the area of a circle with radius 7cm? (π=22/7)", options:["154cm²","144cm²","164cm²","134cm²"], correct:0 },
                { id:3, type:"saq", text:"Expand: (a+b)²", answer:["a²+2ab+b²","a^2+2ab+b^2"] },
                { id:4, type:"mcq", text:"If f(x)=3x-2, find f(4)", options:["10","12","14","8"], correct:0 },
                { id:5, type:"saq", text:"Simplify: √64", answer:["8"] },
                { id:6, type:"mcq", text:"The sum of angles in a triangle is:", options:["90°","180°","270°","360°"], correct:1 },
                { id:7, type:"mcq", text:"Factorise: x²-9", options:["(x-3)(x+3)","(x-9)(x+1)","(x-3)²","(x+9)(x-1)"], correct:0 },
                { id:8, type:"saq", text:"What is the value of π (pi) correct to 2 decimal places?", answer:["3.14"] },
                { id:9, type:"mcq", text:"Solve: 3y - 7 = 2y + 3", options:["y=10","y=4","y=-4","y=0"], correct:0 },
                { id:10, type:"mcq", text:"What is the perimeter of a rectangle with length 8cm and width 5cm?", options:["26cm","40cm","13cm","20cm"], correct:0 },
                { id:11, type:"saq", text:"Convert 0.75 to a fraction in its simplest form.", answer:["3/4"] },
                { id:12, type:"mcq", text:"If a=2, b=3, evaluate a²+b²", options:["13","10","5","12"], correct:0 },
                { id:13, type:"mcq", text:"Which of these is a prime number?", options:["15","21","23","27"], correct:2 },
                { id:14, type:"saq", text:"Simplify: 2(3x - 4) + 5", answer:["6x-3","6x - 3"] },
                { id:15, type:"mcq", text:"The mean of 2,4,6,8,10 is:", options:["5","6","7","8"], correct:1 },
                { id:16, type:"mcq", text:"What is the next term: 2,4,8,16,?", options:["24","32","30","20"], correct:1 },
                { id:17, type:"saq", text:"Write 25% as a decimal.", answer:["0.25"] },
                { id:18, type:"mcq", text:"If the diameter of a circle is 14cm, its radius is:", options:["28cm","7cm","14cm","21cm"], correct:1 },
                { id:19, type:"mcq", text:"Solve: x/5 = 4", options:["20","9","1","0.8"], correct:0 },
                { id:20, type:"saq", text:"Express 500 in standard form.", answer:["5×10²","5*10^2","5x10^2"] }
            ],
            "English Language": [
                { id:1, type:"mcq", text:"Choose the correct option: Neither the teacher nor the students ___ present.", options:["was","were","are","is"], correct:1 },
                { id:2, type:"saq", text:"Give a synonym for 'happy'.", answer:["joyful","glad","cheerful","content"] },
                { id:3, type:"mcq", text:"What is the past tense of 'go'?", options:["goed","went","gone","going"], correct:1 },
                { id:4, type:"saq", text:"Complete the proverb: 'All that glitters is not _____.'", answer:["gold"] },
                { id:5, type:"mcq", text:"Which word is an adjective?", options:["quickly","beautiful","run","and"], correct:1 },
                { id:6, type:"mcq", text:"The phrase 'kick the bucket' means:", options:["to dance","to die","to start","to play"], correct:1 },
                { id:7, type:"saq", text:"Write the plural of 'child'.", answer:["children"] },
                { id:8, type:"mcq", text:"Choose the correct spelling:", options:["recieve","receive","receve","reseive"], correct:1 },
                { id:9, type:"saq", text:"Give an antonym for 'brave'.", answer:["cowardly","timid","fearful"] },
                { id:10, type:"mcq", text:"Identify the figure of speech: 'She is as busy as a bee.'", options:["metaphor","simile","personification","irony"], correct:1 },
                { id:11, type:"saq", text:"Correct the sentence: 'He don't like apples.'", answer:["He doesn't like apples."] },
                { id:12, type:"mcq", text:"Which is a conjunction?", options:["quickly","but","beautiful","under"], correct:1 },
                { id:13, type:"mcq", text:"The word 'unhappy' contains a:", options:["suffix","prefix","root","verb"], correct:1 },
                { id:14, type:"saq", text:"Write the comparative form of 'good'.", answer:["better"] },
                { id:15, type:"mcq", text:"'The boy who cried wolf' teaches about:", options:["honesty","kindness","bravery","patience"], correct:0 },
                { id:16, type:"mcq", text:"Choose the correct article: ___ hour ago.", options:["a","an","the","no article"], correct:1 },
                { id:17, type:"saq", text:"What is the meaning of 'benevolent'?", answer:["kind","generous","charitable"] },
                { id:18, type:"mcq", text:"Which sentence is correct?", options:["He go to school.","He goes to school.","He going to school.","He gone to school."], correct:1 },
                { id:19, type:"saq", text:"Rearrange: 'book / interesting / an / is / this'", answer:["This is an interesting book."] },
                { id:20, type:"mcq", text:"A group of sheep is called a:", options:["flock","herd","pack","school"], correct:0 }
            ],
            "Physics": [
                { id:1, type:"mcq", text:"What is the SI unit of force?", options:["Joule","Newton","Watt","Pascal"], correct:1 },
                { id:2, type:"saq", text:"State Ohm's law.", answer:["V=IR","voltage = current × resistance","v=ir"] },
                { id:3, type:"mcq", text:"Which mirror is used as a rear-view mirror?", options:["concave","convex","plane","cylindrical"], correct:1 },
                { id:4, type:"mcq", text:"The speed of light in vacuum is approximately:", options:["3×10⁸ m/s","3×10⁶ m/s","300 m/s","3×10¹⁰ m/s"], correct:0 },
                { id:5, type:"saq", text:"Define acceleration.", answer:["rate of change of velocity"] },
                { id:6, type:"mcq", text:"Which device converts electrical energy to mechanical?", options:["Motor","Generator","Battery","Resistor"], correct:0 },
                { id:7, type:"mcq", text:"An object with mass 5kg is moving at 2m/s. Its kinetic energy is:", options:["10J","20J","5J","4J"], correct:0 },
                { id:8, type:"saq", text:"What is the formula for weight?", answer:["W=mg","weight = mass × gravity"] },
                { id:9, type:"mcq", text:"The unit of electric current is:", options:["Volt","Ampere","Ohm","Coulomb"], correct:1 },
                { id:10, type:"saq", text:"What is the principle of conservation of energy?", answer:["energy cannot be created or destroyed"] },
                { id:11, type:"mcq", text:"Which color has the longest wavelength?", options:["Violet","Blue","Green","Red"], correct:3 },
                { id:12, type:"mcq", text:"A magnet has ____ poles.", options:["one","two","three","four"], correct:1 },
                { id:13, type:"saq", text:"What does LED stand for?", answer:["light emitting diode"] },
                { id:14, type:"mcq", text:"The earth's pull on a body is called:", options:["mass","weight","inertia","momentum"], correct:1 },
                { id:15, type:"mcq", text:"Sound travels fastest in:", options:["air","water","vacuum","steel"], correct:3 },
                { id:16, type:"saq", text:"Convert 1km to meters.", answer:["1000"] },
                { id:17, type:"mcq", text:"A lens that converges light is:", options:["concave","convex","plano","bifocal"], correct:1 },
                { id:18, type:"mcq", text:"What is the boiling point of water at sea level?", options:["90°C","100°C","110°C","120°C"], correct:1 },
                { id:19, type:"saq", text:"Define work done.", answer:["force × distance"] },
                { id:20, type:"mcq", text:"Which of these is a semiconductor?", options:["copper","glass","silicon","rubber"], correct:2 }
            ],
            "General Paper": [
                { id:1, type:"mcq", text:"Who is the current UN Secretary-General (2024)?", options:["António Guterres","Ban Ki-moon","Kofi Annan","Boutros Boutros-Ghali"], correct:0 },
                { id:2, type:"saq", text:"What does UNESCO stand for?", answer:["United Nations Educational, Scientific and Cultural Organization"] },
                { id:3, type:"mcq", text:"Which country won the 2022 FIFA World Cup?", options:["France","Brazil","Argentina","Germany"], correct:2 },
                { id:4, type:"mcq", text:"The largest continent by area is:", options:["Africa","Asia","Europe","North America"], correct:1 },
                { id:5, type:"saq", text:"Name the first president of Nigeria.", answer:["Nnamdi Azikiwe","Dr. Nnamdi Azikiwe"] },
                { id:6, type:"mcq", text:"Which planet is known as the Red Planet?", options:["Venus","Mars","Jupiter","Saturn"], correct:1 },
                { id:7, type:"mcq", text:"What is the chemical symbol for gold?", options:["Ag","Au","Fe","Cu"], correct:1 },
                { id:8, type:"saq", text:"What year did Nigeria gain independence?", answer:["1960"] },
                { id:9, type:"mcq", text:"The river Niger flows through which countries?", options:["Nigeria only","Nigeria and Niger","Several West African countries","Mali only"], correct:2 },
                { id:10, type:"saq", text:"Define globalization.", answer:["increasing interconnectedness of the world"] },
                { id:11, type:"mcq", text:"The capital of Canada is:", options:["Toronto","Ottawa","Vancouver","Montreal"], correct:1 },
                { id:12, type:"mcq", text:"Which element is diamond made of?", options:["Oxygen","Carbon","Silicon","Nitrogen"], correct:1 },
                { id:13, type:"saq", text:"What does HTTP stand for?", answer:["hypertext transfer protocol"] },
                { id:14, type:"mcq", text:"The UN was founded in:", options:["1945","1919","1939","1950"], correct:0 },
                { id:15, type:"saq", text:"Mention one function of the liver.", answer:["detoxification","bile production","metabolism"] },
                { id:16, type:"mcq", text:"Which gas do plants absorb?", options:["Oxygen","Nitrogen","Carbon dioxide","Hydrogen"], correct:2 },
                { id:17, type:"mcq", text:"The currency of the United Kingdom is:", options:["Euro","Dollar","Pound Sterling","Yen"], correct:2 },
                { id:18, type:"saq", text:"Name the longest river in the world.", answer:["Nile","the Nile"] },
                { id:19, type:"mcq", text:"Who painted the Mona Lisa?", options:["Van Gogh","Da Vinci","Picasso","Michelangelo"], correct:1 },
                { id:20, type:"saq", text:"What is the boiling point of water in Celsius?", answer:["100","100°C"] }
            ]
        };

        const state = {
            candidate: null,
            selectedSubjects: [],
            allQuestions: [],
            currentIndex: 0,
            answers: {},
            violations: 0,
            examStartTime: null,
            timerInterval: null,
            timeRemaining: EXAM_DURATION_SEC,
            faceLandmarker: null,
            cameraStream: null,
            examSubmitted: false
        };

        const $ = s => document.querySelector(s);
        const candidateLogin = $('#candidateLogin');
        const preExamScreen = $('#preExamScreen');
        const examScreen = $('#examScreen');
        const resultsScreen = $('#resultsScreen');
        const calcFloat = $('#calcFloat');

        // Multi-select initialization
        function initMultiSelect() {
            const container = $('#subjectMultiSelect');
            const tagsDiv = $('#subjectTags');
            const dropdown = $('#subjectDropdown');
            const searchInput = $('#subjectSearch');
            const optionsDiv = $('#subjectOptions');
            let selected = [];
            const allSubjects = Object.keys(questionBank);

            function renderOptions(filter='') {
                optionsDiv.innerHTML = '';
                allSubjects.filter(s => s.toLowerCase().includes(filter.toLowerCase())).forEach(sub => {
                    const div = document.createElement('div'); div.className='option';
                    const checked = selected.includes(sub);
                    div.innerHTML = `<input type="checkbox" ${checked?'checked':''}> ${sub}`;
                    div.querySelector('input').addEventListener('change', (e) => {
                        if(e.target.checked) {
                            if(selected.length>=4) { e.target.checked=false; return; }
                            selected.push(sub);
                        } else { selected = selected.filter(s=>s!==sub); }
                        updateTags(); renderOptions(searchInput.value);
                    });
                    optionsDiv.appendChild(div);
                });
            }
            function updateTags() {
                tagsDiv.innerHTML = '';
                if(!selected.length) tagsDiv.innerHTML = '<span style="color:#94a3b8;">Click to select subjects...</span>';
                else selected.forEach(sub => {
                    const tag = document.createElement('span'); tag.className='tag';
                    tag.innerHTML = `${sub} <span class="remove" data-sub="${sub}">✕</span>`;
                    tag.querySelector('.remove').addEventListener('click', e => {
                        e.stopPropagation(); selected = selected.filter(s=>s!==sub);
                        updateTags(); renderOptions(searchInput.value);
                    });
                    tagsDiv.appendChild(tag);
                });
                state.selectedSubjects = selected;
            }
            tagsDiv.addEventListener('click', ()=>{ dropdown.classList.toggle('open'); renderOptions(); });
            searchInput.addEventListener('input', e => renderOptions(e.target.value));
            document.addEventListener('click', e => { if(!container.contains(e.target)) dropdown.classList.remove('open'); });
            renderOptions(); updateTags();
        }

        // Login
        document.getElementById('candidateForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if(state.selectedSubjects.length < 3) return alert('Please select at least 3 subjects.');
            if($('#examPin').value !== VALID_PIN) return alert('Invalid exam PIN.');
            state.candidate = {
                name: $('#fullName').value.trim(), email: $('#email').value.trim(),
                nin: $('#nin').value.trim(), phone: $('#phone').value.trim()
            };
            state.allQuestions = [];
            state.selectedSubjects.forEach(sub => {
                state.allQuestions.push(...questionBank[sub].map(q => ({...q, subject:sub})));
            });
            state.currentIndex = 0; state.answers = {}; state.violations = 0;
            state.timeRemaining = EXAM_DURATION_SEC;
            showPreExamCheck();
        });

        function showPreExamCheck() {
            preExamScreen.innerHTML = `
                <div style="max-width:600px;margin:40px auto;background:#fff;padding:30px;border-radius:20px;">
                    <h2>Pre-Exam System Check</h2>
                    <ul class="checklist" id="checklist">
                        <li id="checkCamera"><span>📷</span> Camera <span class="status-icon">⏳</span></li>
                        <li id="checkMic"><span>🎤</span> Microphone <span class="status-icon">⏳</span></li>
                        <li id="checkFullscreen"><span>🖥️</span> Fullscreen <span class="status-icon">⏳</span></li>
                    </ul>
                    <div class="camera-preview-box"><video id="previewVideo" autoplay muted playsinline></video></div>
                    <button class="btn btn-outline btn-sm" id="requestCamera">Request Camera</button>
                    <button class="btn btn-outline btn-sm" id="requestFullscreen">Enter Fullscreen</button>
                    <label style="display:block;margin-top:16px;"><input type="checkbox" id="agreeRules"> I agree to exam rules.</label>
                    <button class="btn btn-primary" id="startExamBtn" disabled>Start Exam</button>
                </div>`;
            candidateLogin.classList.remove('active');
            preExamScreen.classList.add('active');

            const video = $('#previewVideo');
            document.getElementById('requestCamera').addEventListener('click', async () => {
                try {
                    state.cameraStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
                    video.srcObject = state.cameraStream;
                    document.getElementById('checkCamera').classList.add('passed');
                    document.getElementById('checkCamera').querySelector('.status-icon').textContent='✅';
                    document.getElementById('checkMic').classList.add('passed');
                    document.getElementById('checkMic').querySelector('.status-icon').textContent='✅';
                } catch(e) { alert('Camera/Mic access denied.'); }
                checkAll();
            });
            document.getElementById('requestFullscreen').addEventListener('click', ()=>{
                if(document.fullscreenEnabled) document.documentElement.requestFullscreen();
                else alert('Fullscreen not supported.');
            });
            document.addEventListener('fullscreenchange', ()=>{
                const fsEl = document.getElementById('checkFullscreen');
                if(document.fullscreenElement) {
                    fsEl.classList.add('passed'); fsEl.querySelector('.status-icon').textContent='✅';
                } else {
                    fsEl.classList.remove('passed'); fsEl.querySelector('.status-icon').textContent='❌';
                }
                checkAll();
            });
            $('#agreeRules').addEventListener('change', checkAll);
            function checkAll() {
                const camOk = document.getElementById('checkCamera').classList.contains('passed');
                const fsOk = document.getElementById('checkFullscreen').classList.contains('passed');
                const agreed = $('#agreeRules').checked;
                document.getElementById('startExamBtn').disabled = !(camOk && fsOk && agreed);
            }
            document.getElementById('startExamBtn').addEventListener('click', startExam);
        }

        function startExam() {
            preExamScreen.classList.remove('active');
            examScreen.classList.add('active');
            state.examStartTime = Date.now();
            state.violations = 0; updateViolationCounter();
            updateTimer();
            state.timerInterval = setInterval(() => {
                state.timeRemaining--;
                updateTimer();
                if(state.timeRemaining <= 0) submitExam(true);
            }, 1000);
            updateCalculatorVisibility();
            renderQuestion();
            startProctoring();
        }

        function updateTimer() {
            const mins = Math.floor(state.timeRemaining/60);
            const secs = state.timeRemaining%60;
            $('#examTimer').textContent = `⏱ ${mins}:${secs.toString().padStart(2,'0')}`;
        }

        function updateCalculatorVisibility() {
            const q = state.allQuestions[state.currentIndex];
            const show = ['Mathematics','Physics'].includes(q.subject);
            document.getElementById('toggleCalculator').style.display = show ? 'inline-flex' : 'none';
            $('#currentSubjectLabel').textContent = q.subject;
        }

        function renderQuestion() {
            const q = state.allQuestions[state.currentIndex];
            const container = $('#questionContainer');
            const prev = state.currentIndex>0 ? state.allQuestions[state.currentIndex-1].subject : null;
            let html = '';
            if(q.subject !== prev) html += `<div class="subject-header">${q.subject}</div>`;
            html += `<p><strong>Q${state.currentIndex+1}.</strong> ${q.text}</p>`;
            if(q.type === 'mcq') {
                html += '<div class="options">';
                q.options.forEach((opt,i) => {
                    const checked = state.answers[q.id] === i ? 'checked' : '';
                    html += `<label style="display:block;margin:8px 0;"><input type="radio" name="opt" value="${i}" ${checked}> ${opt}</label>`;
                });
                html += '</div>';
            } else {
                const val = state.answers[q.id] || '';
                html += `<input type="text" class="saq-input" id="saqInput" value="${val}" placeholder="Type your answer">`;
            }
            container.innerHTML = html;
            if(q.type === 'mcq') {
                document.querySelectorAll('input[name="opt"]').forEach(r => {
                    r.addEventListener('change', (e) => state.answers[q.id] = parseInt(e.target.value));
                });
            } else {
                document.getElementById('saqInput').addEventListener('input', e => state.answers[q.id] = e.target.value.trim());
            }
            updateCalculatorVisibility();
        }

        document.getElementById('prevQuestion').addEventListener('click', ()=>{
            if(state.currentIndex>0) { state.currentIndex--; renderQuestion(); }
        });
        document.getElementById('nextQuestion').addEventListener('click', ()=>{
            if(state.currentIndex < state.allQuestions.length-1) { state.currentIndex++; renderQuestion(); }
        });
        document.getElementById('saveAnswer').addEventListener('click', ()=> alert('Answer saved!'));
        document.getElementById('submitExam').addEventListener('click', ()=>{
            if(confirm('Submit exam?')) submitExam(false);
        });

        // Calculator
        document.getElementById('toggleCalculator').addEventListener('click', ()=> calcFloat.style.display = calcFloat.style.display==='block'?'none':'block');
        document.getElementById('closeCalc').addEventListener('click', ()=> calcFloat.style.display='none');
        const calcBtns = ['C','⌫','%','/','7','8','9','*','4','5','6','-','1','2','3','+','0','.','π','='];
        const calcBtnsDiv = document.getElementById('calcButtons');
        calcBtns.forEach(label => {
            const btn = document.createElement('button'); btn.textContent = label;
            btn.style.cssText = 'padding:12px;border:1px solid #ddd;background:#f9fafb;cursor:pointer;';
            btn.addEventListener('click', ()=> handleCalc(label));
            calcBtnsDiv.appendChild(btn);
        });
        let calcExpr = '';
        function handleCalc(key) {
            if(key==='C') calcExpr='';
            else if(key==='⌫') calcExpr=calcExpr.slice(0,-1);
            else if(key==='=') { try { calcExpr = eval(calcExpr).toString(); } catch { calcExpr='Error'; } }
            else if(key==='π') calcExpr += Math.PI;
            else calcExpr += key;
            document.getElementById('calcDisplay').textContent = calcExpr || '0';
        }

        // AI Proctoring
        async function startProctoring() {
            if(!state.cameraStream) return;
            const video = document.createElement('video');
            video.srcObject = state.cameraStream; video.play();
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm");
            state.faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO", numFaces: 2
            });
            let lastTime = performance.now();
            async function detect() {
                if(!state.faceLandmarker || !state.examStartTime) return;
                const now = performance.now();
                if(now - lastTime < 200) { requestAnimationFrame(detect); return; }
                lastTime = now;
                const results = state.faceLandmarker.detectForVideo(video, now);
                if(results.faceLandmarks.length === 0) handleViolation("No face detected");
                else if(results.faceLandmarks.length > 1) handleViolation("Multiple faces");
                else {
                    const nose = results.faceLandmarks[0][1];
                    if(nose.x < 0.35) handleViolation("Looking left");
                    else if(nose.x > 0.65) handleViolation("Looking right");
                }
                requestAnimationFrame(detect);
            }
            detect();
        }

        function handleViolation(reason) {
            if(state.examSubmitted) return;
            state.violations++;
            updateViolationCounter();
            const toast = document.createElement('div');
            toast.className = 'violation-toast show';
            toast.textContent = `⚠️ ${reason} (${state.violations}/${MAX_VIOLATIONS})`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
            if(state.violations >= MAX_VIOLATIONS) submitExam(true);
        }

        function updateViolationCounter() {
            document.getElementById('violationCounter').textContent = `⚠️ ${state.violations}/${MAX_VIOLATIONS}`;
        }

        function submitExam(auto=false) {
            if(state.examSubmitted) return;
            state.examSubmitted = true;
            clearInterval(state.timerInterval);
            if(state.cameraStream) state.cameraStream.getTracks().forEach(t=>t.stop());
            if(document.fullscreenElement) document.exitFullscreen();
            const subjects = [...new Set(state.allQuestions.map(q=>q.subject))];
            const subjectResults = {};
            subjects.forEach(sub => subjectResults[sub] = {mcqCorrect:0,mcqTotal:0,saqCorrect:0,saqTotal:0});
            state.allQuestions.forEach(q => {
                const ans = state.answers[q.id];
                if(q.type==='mcq') {
                    subjectResults[q.subject].mcqTotal++;
                    if(ans===q.correct) subjectResults[q.subject].mcqCorrect++;
                } else {
                    subjectResults[q.subject].saqTotal++;
                    if(ans && q.answer.some(a=>a.toLowerCase()===ans.toLowerCase())) subjectResults[q.subject].saqCorrect++;
                }
            });
            const totalMCQ = Object.values(subjectResults).reduce((a,b)=>a+b.mcqCorrect,0);
            const totalMCQAll = Object.values(subjectResults).reduce((a,b)=>a+b.mcqTotal,0);
            const totalSAQ = Object.values(subjectResults).reduce((a,b)=>a+b.saqCorrect,0);
            const totalSAQAll = Object.values(subjectResults).reduce((a,b)=>a+b.saqTotal,0);
            const timeUsed = Math.round((EXAM_DURATION_SEC - state.timeRemaining)/60);
            const result = {
                ...state.candidate,
                subjects: subjects.join(', '),
                mcqScore: `${totalMCQ}/${totalMCQAll}`,
                saqScore: `${totalSAQ}/${totalSAQAll}`,
                totalScore: `${totalMCQ+totalSAQ}/${totalMCQAll+totalSAQAll}`,
                violations: state.violations,
                timeUsed: timeUsed,
                subjectBreakdown: subjectResults,
                date: new Date().toLocaleString()
            };
            const all = JSON.parse(localStorage.getItem('examResults')||'[]');
            all.push(result);
            localStorage.setItem('examResults', JSON.stringify(all));
            examScreen.classList.remove('active');
            resultsScreen.classList.add('active');
            $('#resultsContent').innerHTML = `
                <p><strong>Name:</strong> ${result.name}</p>
                <p><strong>Subjects:</strong> ${result.subjects}</p>
                <p><strong>MCQ Score:</strong> ${result.mcqScore}</p>
                <p><strong>SAQ Score:</strong> ${result.saqScore}</p>
                <p><strong>Total Score:</strong> ${result.totalScore}</p>
                <p><strong>Violations:</strong> ${result.violations}</p>
                <p><strong>Time Used:</strong> ${result.timeUsed} min</p>
            `;
        }

        initMultiSelect();
    </script>
</body>
</html>
