<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>OIMI CBT Portal – Proctored (with Face Tracking)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e2e8f0;
            user-select: none;
            overflow-x: hidden;
        }
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 16px;
            padding: 32px;
        }
        input,
        select {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(124, 58, 237, 0.4);
            color: #e2e8f0;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            width: 100%;
        }
        button {
            cursor: pointer;
            border: none;
            font-weight: 700;
            transition: all 0.2s;
        }
        .btn-purple {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            color: #fff;
            padding: 14px 28px;
            border-radius: 10px;
        }
        .btn-disabled {
            background: rgba(124, 58, 237, 0.2);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }
        .label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #a78bfa;
            font-weight: 600;
            text-transform: uppercase;
        }
        .timer {
            font-size: 22px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }
        .violation-badge {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 4px 12px;
            border-radius: 8px;
            color: #fca5a5;
        }
        .palette-btn {
            border-radius: 6px;
            padding: 6px 0;
            font-size: 13px;
            font-weight: 700;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #94a3b8;
        }
        .palette-btn.answered {
            background: #10b981;
            color: #fff;
        }
        .palette-btn.flagged {
            background: #f59e0b;
            color: #fff;
        }
        .palette-btn.current {
            background: #7c3aed;
            color: #fff;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-box {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(124, 58, 237, 0.5);
            border-radius: 16px;
            padding: 24px;
            max-width: 380px;
            width: 90%;
            text-align: center;
        }
        .calc-display {
            background: #0f0f23;
            border-radius: 8px;
            padding: 8px 12px;
            color: #e2e8f0;
            font-size: 22px;
            text-align: right;
            margin-bottom: 8px;
            min-height: 40px;
            word-break: break-all;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .calc-btn {
            padding: 10px 0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            background: #2d2d4e;
            color: #fff;
        }
        .calc-op {
            background: #7c3aed;
        }
        .calc-clear {
            background: #dc2626;
        }
        .proctor-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
        }
        .noise-bar {
            width: 60px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
        }
        .noise-fill {
            height: 100%;
            background: #f59e0b;
            width: 0%;
            transition: width 0.1s;
        }
        .face-status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 4px;
            transition: background 0.3s;
        }
        .face-status-dot.loading {
            background: #f59e0b;
            animation: pulse-dot 1s infinite;
        }
        .face-status-dot.ok {
            background: #10b981;
        }
        .face-status-dot.error {
            background: #ef4444;
        }
        .face-status-dot.off {
            background: #64748b;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }
        @media (max-width: 768px) {
            .exam-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100% !important;
                flex-direction: row;
                flex-wrap: wrap;
            }
        }
        .face-loading-overlay {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 10px;
            color: #94a3b8;
            margin-top: 2px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="root" class="app"></div>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js">
    </script>

    <!-- MediaPipe Face Mesh (loaded on demand) – with explicit version for stability -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1646425221/face_mesh.js" defer>
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029078/camera_utils.js" defer>
    </script>

    <script>
        (() => {
            // ─── EMAILJS ──────────────────────────────────────────────────
            const EMAILJS_USER_ID = "mt3HJUIfu1kcIMjGb";
            const EMAILJS_SERVICE_ID = "service_rrx6495";
            const EMAILJS_TEMPLATE_ID = "template_gf9ilrc";
            const ADMIN_EMAIL = "oimi6702@gmail.com";

            if (window.emailjs) {
                emailjs.init(EMAILJS_USER_ID);
            } else {
                console.warn('EmailJS not loaded – email sending will be unavailable.');
            }

            // ─── QUESTION BANK ──────────────────────────────────────────
            const QUESTION_BANK = {
                Mathematics: [
                    { id: "m1", type: "mcq", question: "Simplify: 3x² + 2x² − x²", options: ["4x²", "5x²", "6x²",
                            "3x²"
                        ], answer: "4x²" },
                    { id: "m2", type: "mcq", question: "If 2x + 3 = 11, find x", options: ["3", "4", "5", "6"],
                        answer: "4" },
                    { id: "m3", type: "mcq", question: "What is the simple interest on ₦5,000 at 8% per annum for 3 years?",
                        options: ["₦1,000", "₦1,200", "₦1,500", "₦2,000"], answer: "₦1,200" },
                    { id: "m4", type: "mcq", question: "Find the value of x: 5x − 7 = 3x + 9", options: ["6", "7", "8",
                            "9"
                        ], answer: "8" },
                    { id: "m5", type: "mcq", question: "A trader bought goods for ₦8,000 and sold for ₦10,000. Find the percentage profit.",
                        options: ["20%", "25%", "15%", "30%"], answer: "25%" },
                    { id: "m6", type: "mcq", question: "Evaluate: log₁₀ 1000", options: ["2", "3", "4", "10"],
                        answer: "3" },
                    { id: "m7", type: "mcq", question: "The sum of interior angles of a hexagon is:", options: ["540°",
                            "620°", "720°", "800°"
                        ], answer: "720°" },
                    { id: "m8", type: "mcq", question: "If P = {2,4,6,8} and Q = {1,2,3,4}, find P ∩ Q",
                        options: ["{2,4}", "{1,2,3,4,6,8}", "{6,8}", "{1,3}"], answer: "{2,4}" },
                    { id: "m9", type: "saq", question: "If the area of a square is 64 cm², what is the length of one side? (write in digits)",
                        answer: "8" },
                    { id: "m10", type: "saq", question: "A man scores 15 out of 20. What is his percentage score? (write in digits only, no % sign)",
                        answer: "75" },
                    { id: "m11", type: "mcq", question: "Solve: 3(x+2) = 21", options: ["5", "6", "7", "8"],
                    answer: "7" },
                    { id: "m12", type: "mcq", question: "The slope of the line y = 2x + 5 is:", options: ["2", "5",
                            "-2", "-5"
                        ], answer: "2" },

                        answer: "70" },
                    { id: "m14", type: "mcq", question: "What is 20% of 150?", options: ["20", "30", "35", "25"],

                    { id: "m15", type: "mcq", question: "Factorise: x² - 9", options: ["(x-3)(x+3)", "(x-9)(x+1)",
                            "(x-3)(x-3)", "(x+9)(x-1)"
                        ], answer: "(x-3)(x+3)" },
                ],
                English: [
                    { id: "e1", type: "mcq", question: "Choose the word closest in meaning to BENEVOLENT:",
                        options: ["Cruel", "Generous", "Selfish", "Hostile"], answer: "Generous" },
                    { id: "e2", type: "mcq", question: "Choose the antonym of TURBULENT:", options: ["Calm", "Stormy",
                            "Rough", "Wild"
                        ], answer: "Calm" },
                    { id: "e3", type: "mcq", question: "Select the correct sentence:", options: [
                            "Each of the boys have a pen",
                            "Each of the boys has a pen",
                            "Each of the boy have a pen",
                            "Each of the boys are having a pen"
                        ], answer: "Each of the boys has a pen" },
                    { id: "e4", type: "mcq", question: "The plural of 'phenomenon' is:", options: ["Phenomenons",
                            "Phenomenas", "Phenomena", "Phenomenes"
                        ], answer: "Phenomena" },
                    { id: "e5", type: "mcq", question: "Choose the word opposite in meaning to LOQUACIOUS:",
                        options: ["Talkative", "Verbose", "Taciturn", "Garrulous"], answer: "Taciturn" },
                    { id: "e6", type: "mcq", question: "Identify the figure of speech: 'The wind whispered through the trees'",
                        options: ["Simile", "Metaphor", "Personification", "Hyperbole"], answer: "Personification" },
                    { id: "e7", type: "mcq", question: "Choose the correct spelling:", options: ["Accomodate",
                            "Accommodate", "Acomodate", "Acommodate"
                        ], answer: "Accommodate" },
                    { id: "e8", type: "mcq", question: "Fill in: She has been studying _____ morning.",
                        options: ["since", "from", "for", "during"], answer: "since" },
                    { id: "e9", type: "saq", question: "What is the one-word synonym for 'very hungry'? (lowercase)",
                        answer: "famished" },
                    { id: "e10", type: "saq", question: "Complete the proverb: 'A stitch in time saves ___' (write the number in words)",
                        answer: "nine" },
                    { id: "e11", type: "mcq", question: "Which is the correct comparative form of 'good'?",
                        options: ["badder", "gooder", "better", "best"], answer: "better" },
                    { id: "e12", type: "mcq", question: "Identify the part of speech of the word in caps: 'She RUNS daily.'",
                        options: ["Noun", "Verb", "Adjective", "Adverb"], answer: "Verb" },
                    { id: "e13", type: "saq", question: "Give the antonym of 'ascend' (lowercase)", answer: "descend" },
                    { id: "e14", type: "mcq", question: "Choose the word that means 'to make a mistake':",
                        options: ["Erratic", "Errand", "Err", "Erode"], answer: "Err" },
                    { id: "e15", type: "mcq", question: "Select the correctly punctuated sentence:", options: [
                            "Its a beautiful day.",
                            "It's a beautiful day.",
                            "Its' a beautiful day.",
                            "It is' a beautiful day."
                        ], answer: "It's a beautiful day." },
                ],
                "General Knowledge": [
                    { id: "g1", type: "mcq", question: "Nigeria gained independence in:", options: ["1960", "1963",
                            "1914", "1956"
                        ], answer: "1960" },
                    { id: "g2", type: "mcq", question: "The current Governor of Lagos State (2026) is:",
                        options: ["Babajide Sanwo-Olu", "Akinwunmi Ambode", "Obafemi Awolowo", "Bola Tinubu"],
                        answer: "Babajide Sanwo-Olu" },
                    { id: "g3", type: "mcq", question: "Which planet is known as the Red Planet?", options: ["Venus",
                            "Mars", "Jupiter", "Saturn"
                        ], answer: "Mars" },
                    { id: "g4", type: "mcq", question: "The headquarters of ECOWAS is located in:", options: ["Accra",
                            "Lagos", "Abuja", "Dakar"
                        ], answer: "Abuja" },
                    { id: "g5", type: "mcq", question: "Who was the first President of Nigeria?", options: [
                            "Nnamdi Azikiwe", "Abubakar Tafawa Balewa", "Obafemi Awolowo", "Yakubu Gowon"
                        ], answer: "Nnamdi Azikiwe" },
                    { id: "g6", type: "mcq", question: "The process by which green plants make food is called:",
                        options: ["Respiration", "Transpiration", "Photosynthesis", "Digestion"],
                        answer: "Photosynthesis" },
                    { id: "g7", type: "mcq", question: "Which of these is NOT a primary colour of light?",
                        options: ["Red", "Green", "Yellow", "Blue"], answer: "Yellow" },
                    { id: "g8", type: "mcq", question: "The United Nations was founded in:", options: ["1944", "1945",
                            "1946", "1948"
                        ], answer: "1945" },
                    { id: "g9", type: "saq", question: "What is the capital city of Nigeria? (one word)",
                    answer: "Abuja" },
                    { id: "g10", type: "saq", question: "How many states are in Nigeria? (write in digits)",
                        answer: "36" },
                ],
            };

            // ─── UTILS ──────────────────────────────────────────────────
            function shuffleArray(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function buildExam() {
                const allQ = [];
                for (const [subj, qs] of Object.entries(QUESTION_BANK)) {
                    qs.forEach(q => allQ.push({ ...q, subject: subj }));
                }
                return shuffleArray(allQ);
            }

            const formatTime = (s) =>
                `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

            // ─── STATE ──────────────────────────────────────────────────
            const state = {
                stage: 'login',
                candidate: { name: '', email: '', phone: '', pin: '' },
                checks: {
                    internet: navigator.onLine,
                    camera: false,
                    mic: false,
                    fullscreen: false,
                },
                agreed: false,
                stream: null,
                questions: [],
                current: 0,
                answers: {},
                flagged: new Set(),
                timeLeft: 30 * 60,
                violations: 0,
                violationLog: [],
                showCalc: false,
                showWarning: false,
                warningMsg: '',
                submitted: false,
                loginError: '',
                timerInterval: null,
                internetOnline: navigator.onLine,
                // audio
                audioContext: null,
                analyser: null,
                noiseCheckInterval: null,
                highNoiseSince: null,
                // obstruction
                canvasCtx: null,
                obstructionCheckInterval: null,
                darkSince: null,
                brightSince: null,
                // face mesh – improved state
                faceMesh: null,
                faceMeshRunning: false,
                faceMissingStart: null,
                yawStart: null,
                lastYawStatus: 'center',
                faceInitAttempts: 0,
                faceInitDone: false,
                faceInitError: null,
                faceStatusText: '⏳ initializing…',
                faceStatusDot: 'loading',
                faceMeshRetryTimer: null,
            };

            const root = document.getElementById('root');

            function render() {
                root.innerHTML = '';
                switch (state.stage) {
                    case 'login':
                        renderLogin();
                        break;
                    case 'precheck':
                        renderPrecheck();
                        break;
                    case 'exam':
                        renderExam();
                        break;
                    case 'result':
                        renderResult();
                        break;
                }
            }

            // ─── LOGIN ──────────────────────────────────────────────────
            function renderLogin() {
                const div = document.createElement('div');
                div.style.cssText =
                    'display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;';
                div.innerHTML = `
              <div class="card" style="width:100%;max-width:480px;">
                <div style="text-align:center;margin-bottom:32px;">
                  <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#5b21b6);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;">🎓</div>
                  <h1 style="margin:0;font-size:24px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">OIMI CBT Portal</h1>
                  <p style="margin:8px 0 0;color:#94a3b8;font-size:14px;">2026/2027 Post-UTME Screening Exercise</p>
                </div>
                <div style="display:flex;flex-direction:column;gap:16px;">
                  ${['Full Name','Email Address','Phone Number','Exam PIN'].map((label,i) => {
                    const key = ['name','email','phone','pin'][i];
                    const type = key==='email'?'email':key==='pin'?'password':key==='phone'?'tel':'text';
                    const ph = ['e.g. ISRAEL OKONKWO','e.g. candidate@email.com','e.g. 08012345678','Enter PIN given to you'][i];
                    return `<div><label class="label">${label}</label><input type="${type}" placeholder="${ph}" id="${key}" value="${state.candidate[key] || ''}"></div>`;
                  }).join('')}
                  <div id="loginError" style="background:rgba(239,68,68,0.15);border:1px solid #ef4444;border-radius:8px;padding:10px 14px;color:#fca5a5;font-size:14px;display:${state.loginError?'block':'none'};">${state.loginError}</div>
                  <button id="loginBtn" class="btn-purple" style="width:100%;">Proceed to Pre-Exam Check →</button>
                </div>
              </div>
            `;
                root.appendChild(div);
                document.getElementById('loginBtn').addEventListener('click', handleLogin);
            }

            function handleLogin() {
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const pin = document.getElementById('pin').value.trim();
                if (!name || !email || !phone) {
                    state.loginError = 'Please fill in all fields.';
                    render();
                    return;
                }
                if (pin !== '1234') {
                    state.loginError = 'Invalid PIN. (Use: 1234)';
                    render();
                    return;
                }
                state.candidate = { name, email, phone, pin };
                state.loginError = '';
                state.stage = 'precheck';
                render();
            }

            // ─── PRE-CHECK ─────────────────────────────────────────────
            function renderPrecheck() {
                const allChecksPass = state.checks.camera && state.checks.mic && state.checks.fullscreen && state
                .agreed;
                const div = document.createElement('div');
                div.style.cssText =
                    'display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;';
                div.innerHTML = `
              <div class="card" style="width:100%;max-width:520px;">
                <h2 style="margin:0 0 4px;font-size:20px;font-weight:800;color:#a78bfa;text-align:center;">PRE-EXAM CHECK</h2>
                <p style="text-align:center;color:#64748b;font-size:13px;margin-top:4px;margin-bottom:24px;">Complete all checks before your exam begins</p>
                <div style="background:rgba(124,58,237,0.1);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:14px;color:#cbd5e1;">
                  👤 <strong style="color:#a78bfa;">${state.candidate.name}</strong> · ${state.candidate.email}
                </div>
                <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px;">
                  ${[
                    { key:'internet', label:'Internet Connected', icon:'🌐', auto:true },
                    { key:'camera', label:'Camera Access', icon:'📷', auto:false },
                    { key:'mic', label:'Microphone Access', icon:'🎤', auto:false },
                    { key:'fullscreen', label:'Fullscreen Mode', icon:'🖥️', auto:false },
                  ].map(({key,label,icon}) => `
                    <div style="display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 16px;border:1px solid ${state.checks[key]?'rgba(16,185,129,0.4)':'rgba(255,255,255,0.08)'};">
                      <span>${icon} ${label}</span>
                      <span id="${key}Status">${state.checks[key]?'✅':'⏳'}</span>
                    </div>
                  `).join('')}
                </div>
                <div style="display:flex;gap:10px;margin-bottom:20px;">
                  <button id="reqCamMic" style="flex:1;background:rgba(124,58,237,0.3);color:#a78bfa;padding:10px;border-radius:8px;">📷 Enable Camera & Mic</button>
                  <button id="reqFullscreen" style="flex:1;background:rgba(124,58,237,0.3);color:#a78bfa;padding:10px;border-radius:8px;">🖥️ Enter Fullscreen</button>
                </div>
                <div id="cameraPreviewContainer" style="display:${state.stream?'block':'none'};margin-bottom:20px;border-radius:10px;overflow:hidden;border:2px solid rgba(124,58,237,0.5);">
                  <div style="background:rgba(124,58,237,0.2);padding:6px 12px;font-size:12px;color:#a78bfa;">📹 Live Camera Preview</div>
                  <video id="previewVideo" autoplay muted playsinline style="width:100%;display:block;max-height:200px;object-fit:cover;"></video>
                </div>
                <label style="display:flex;gap:10px;align-items:flex-start;cursor:pointer;margin-bottom:20px;font-size:14px;color:#cbd5e1;line-height:1.5;">
                  <input type="checkbox" id="agreeCheck" ${state.agreed?'checked':''} style="margin-top:2px;accent-color:#7c3aed;width:16px;height:16px;">
                  I agree to the examination rules. I understand that tab switching, exiting fullscreen, or any form of malpractice will result in automatic submission.
                </label>
                <button id="startExamBtn" class="${allChecksPass ? 'btn-purple' : 'btn-disabled'}" style="width:100%;padding:14px;border-radius:10px;" ${allChecksPass ? '' : 'disabled'}>
                  ${allChecksPass ? 'START EXAM' : 'Complete all checks to continue'}
                </button>
                <p style="text-align:center;margin-top:12px;color:#64748b;font-size:12px;">⏱ 30 min · 40 Questions </p>
              </div>
            `;
                root.appendChild(div);

                document.getElementById('reqCamMic').addEventListener('click', requestPermissions);
                document.getElementById('reqFullscreen').addEventListener('click', enterFullscreen);
                document.getElementById('agreeCheck').addEventListener('change', e => {
                    state.agreed = e.target.checked;
                    updatePrecheckButton();
                });
                document.getElementById('startExamBtn').addEventListener('click', startExam);
                if (state.stream) {
                    document.getElementById('previewVideo').srcObject = state.stream;
                }
            }

            function updatePrecheckStatus() {
                ['internet', 'camera', 'mic', 'fullscreen'].forEach(k => {
                    const el = document.getElementById(`${k}Status`);
                    if (el) el.textContent = state.checks[k] ? '✅' : '⏳';
                });
                updatePrecheckButton();
            }

            function updatePrecheckButton() {
                const btn = document.getElementById('startExamBtn');
                if (!btn) return;
                const canStart = state.checks.camera && state.checks.mic && state.checks.fullscreen && state.agreed;
                btn.disabled = !canStart;
                btn.className = canStart ? 'btn-purple' : 'btn-disabled';
                btn.textContent = canStart ? '🚀 START EXAM' : 'Complete all checks to continue';
            }

            async function requestPermissions() {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    state.stream = s;
                    state.checks.camera = true;
                    state.checks.mic = true;
                    if (state.stage === 'precheck') {
                        const video = document.getElementById('previewVideo');
                        if (video) video.srcObject = s;
                        document.getElementById('cameraPreviewContainer').style.display = 'block';
                    }
                } catch (e) {
                    alert('Camera/microphone access denied.');
                }
                if (state.stage === 'precheck') updatePrecheckStatus();
            }

            function enterFullscreen() {
                document.documentElement.requestFullscreen().then(() => {
                    state.checks.fullscreen = true;
                }).catch(() => {
                    state.checks.fullscreen = false;
                }).finally(() => {
                    if (state.stage === 'precheck') updatePrecheckStatus();
                });
            }

            document.addEventListener('fullscreenchange', () => {
                state.checks.fullscreen = !!document.fullscreenElement;
                if (state.stage === 'precheck') updatePrecheckStatus();
                if (state.stage === 'exam' && !document.fullscreenElement && !state.submitted) {
                    addViolation('Exited fullscreen');
                    document.documentElement.requestFullscreen().catch(() => {});
                }
            });

            window.addEventListener('online', () => { state.internetOnline = true;
                state.checks.internet = true; if (state.stage === 'precheck') updatePrecheckStatus(); });
            window.addEventListener('offline', () => { state.internetOnline = false;
                state.checks.internet = false; if (state.stage === 'precheck') updatePrecheckStatus(); });

            // ─── START EXAM ────────────────────────────────────────────
            function startExam() {
                if (!(state.checks.camera && state.checks.mic && state.checks.fullscreen && state.agreed)) return;
                state.questions = buildExam();
                state.current = 0;
                state.answers = {};
                state.flagged = new Set();
                state.timeLeft = 30 * 60;
                state.violations = 0;
                state.violationLog = [];
                state.submitted = false;
                // Reset face state
                state.faceInitAttempts = 0;
                state.faceInitDone = false;
                state.faceInitError = null;
                state.faceStatusText = '⏳ initializing…';
                state.faceStatusDot = 'loading';
                if (state.faceMeshRetryTimer) {
                    clearTimeout(state.faceMeshRetryTimer);
                    state.faceMeshRetryTimer = null;
                }
                state.stage = 'exam';
                if (state.timerInterval) clearInterval(state.timerInterval);
                state.timerInterval = setInterval(timerTick, 1000);
                startNoiseMonitoring();
                startObstructionDetection();
                render();
                // Start face mesh after a short delay to ensure DOM is ready
                setTimeout(() => {
                    const liveVideo = document.getElementById('liveCamera');
                    if (liveVideo && state.stream) {
                        // Ensure video is playing before initializing face mesh
                        if (liveVideo.readyState < 2) {
                            liveVideo.addEventListener('loadeddata', () => {
                                initFaceMeshWithRetry(liveVideo);
                            }, { once: true });
                            liveVideo.play().catch(() => {});
                        } else {
                            initFaceMeshWithRetry(liveVideo);
                        }
                    } else {
                        // Retry if video not ready
                        setTimeout(() => {
                            const v2 = document.getElementById('liveCamera');
                            if (v2 && state.stream) initFaceMeshWithRetry(v2);
                        }, 1000);
                    }
                }, 800);
            }

            // ─── FACE MESH – ROBUST INIT WITH RETRY ──────────────────
            function initFaceMeshWithRetry(videoElement, attempt = 0) {
                if (state.submitted || state.stage !== 'exam') return;
                if (state.faceInitDone) return;
                if (state.faceInitError && attempt > 3) {
                    state.faceStatusText = '❌ face mesh unavailable';
                    state.faceStatusDot = 'error';
                    updateFaceStatusUI();
                    return;
                }
                if (attempt > 0) {
                    state.faceStatusText = `⏳ retrying… (${attempt})`;
                    state.faceStatusDot = 'loading';
                    updateFaceStatusUI();
                }
                state.faceInitAttempts = attempt;

                // Check if FaceMesh is loaded
                if (typeof FaceMesh === 'undefined') {
                    if (attempt < 6) {
                        const delay = Math.min(1000 * (attempt + 1), 5000);
                        state.faceStatusText = `⏳ loading face AI… (${attempt+1}/6)`;
                        state.faceStatusDot = 'loading';
                        updateFaceStatusUI();
                        state.faceMeshRetryTimer = setTimeout(() => {
                            initFaceMeshWithRetry(videoElement, attempt + 1);
                        }, delay);
                    } else {
                        state.faceInitError = 'FaceMesh library not loaded';
                        state.faceStatusText = '❌ face AI unavailable';
                        state.faceStatusDot = 'error';
                        updateFaceStatusUI();
                    }
                    return;
                }

                // Ensure video is ready
                if (videoElement.readyState < 2) {
                    videoElement.addEventListener('loadeddata', () => {
                        initFaceMeshWithRetry(videoElement, attempt);
                    }, { once: true });
                    return;
                }

                try {
                    // Close any existing face mesh
                    if (state.faceMesh) {
                        state.faceMesh.close();
                        state.faceMesh = null;
                    }
                    state.faceMeshRunning = false;

                    const faceMesh = new FaceMesh({
                        locateFile: (file) =>
                            `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1646425221/${file}`
                    });

                    faceMesh.setOptions({
                        maxNumFaces: 2,
                        refineLandmarks: false,
                        minDetectionConfidence: 0.5,
                        minTrackingConfidence: 0.5,
                    });

                    // Track if we've gotten first results
                    let firstResults = false;

                    faceMesh.onResults((results) => {
                        if (state.submitted || state.stage !== 'exam') return;
                        if (!firstResults) {
                            firstResults = true;
                            state.faceInitDone = true;
                            state.faceInitError = null;
                            state.faceStatusText = '✅ face tracking active';
                            state.faceStatusDot = 'ok';
                            updateFaceStatusUI();
                        }
                        const faces = results.multiFaceLandmarks;
                        const faceCount = faces ? faces.length : 0;
                        const facePresent = faceCount > 0;
                        const multipleFaces = faceCount > 1;

                        const faceStatusEl = document.getElementById('faceStatus');
                        if (faceStatusEl) {
                            if (multipleFaces) faceStatusEl.innerHTML = '❌ (multiple)';
                            else if (!facePresent) faceStatusEl.innerHTML = '❌ (none)';
                            else {
                                const yaw = getYaw(faces[0]);
                                const icon = yaw < -15 ? '👈' : yaw > 15 ? '👉' : '✅';
                                faceStatusEl.innerHTML = icon + ' (head forward)';
                            }
                        }

                        if (multipleFaces) {
                            addViolation('Multiple faces detected');
                            return;
                        }

                        if (!facePresent) {
                            if (!state.faceMissingStart) state.faceMissingStart = Date.now();
                            else if (Date.now() - state.faceMissingStart > 3000) {
                                addViolation('Face not visible for 3 seconds');
                                state.faceMissingStart = null;
                            }
                        } else {
                            state.faceMissingStart = null;
                        }

                        if (facePresent && faces[0]) {
                            const yaw = getYaw(faces[0]);
                            let currentStatus = 'center';
                            if (yaw < -15) currentStatus = 'left';
                            else if (yaw > 15) currentStatus = 'right';

                            if (currentStatus !== 'center') {
                                if (!state.yawStart) state.yawStart = Date.now();
                                else if (Date.now() - state.yawStart > 2000) {
                                    addViolation(`Head turned ${currentStatus} for 2 seconds`);
                                    state.yawStart = null;
                                }
                            } else {
                                state.yawStart = null;
                            }
                            state.lastYawStatus = currentStatus;
                        }
                    });

                    const sendFrame = async () => {
                        if (!state.faceMeshRunning || state.submitted || state.stage !== 'exam') return;
                        try {
                            await faceMesh.send({ image: videoElement });
                        } catch (err) {
                            // Silently handle errors – the loop will continue
                            console.debug('FaceMesh send error:', err);
                        }
                        if (state.faceMeshRunning && !state.submitted) {
                            requestAnimationFrame(sendFrame);
                        }
                    };

                    state.faceMesh = faceMesh;
                    state.faceMeshRunning = true;
                    // Set a timeout to detect if we never get results
                    const resultTimeout = setTimeout(() => {
                        if (!firstResults && state.faceMeshRunning && !state.submitted) {
                            state.faceInitError = 'Face detection timed out';
                            state.faceStatusText = '⚠️ face AI slow – retrying…';
                            state.faceStatusDot = 'loading';
                            updateFaceStatusUI();
                            // Retry after a delay
                            state.faceMeshRunning = false;
                            faceMesh.close();
                            state.faceMesh = null;
                            state.faceMeshRetryTimer = setTimeout(() => {
                                const v3 = document.getElementById('liveCamera');
                                if (v3 && state.stream) initFaceMeshWithRetry(v3, state.faceInitAttempts + 1);
                            }, 2000);
                        }
                    }, 8000);

                    // Override onResults to clear the timeout when we get first results
                    const originalOnResults = faceMesh.onResults;
                    faceMesh.onResults = (results) => {
                        if (!firstResults) {
                            firstResults = true;
                            clearTimeout(resultTimeout);
                            state.faceInitDone = true;
                            state.faceInitError = null;
                            state.faceStatusText = '✅ face tracking active';
                            state.faceStatusDot = 'ok';
                            updateFaceStatusUI();
                        }
                        // Call the original handler
                        originalOnResults(results);
                    };

                    // Start the loop
                    sendFrame();

                    state.faceStatusText = '⏳ detecting face…';
                    state.faceStatusDot = 'loading';
                    updateFaceStatusUI();

                } catch (err) {
                    console.warn('FaceMesh init error:', err);
                    state.faceInitError = err.message || 'unknown error';
                    state.faceStatusText = '⚠️ face init error – retrying…';
                    state.faceStatusDot = 'error';
                    updateFaceStatusUI();
                    if (attempt < 4) {
                        const delay = Math.min(1500 * (attempt + 1), 5000);
                        state.faceMeshRetryTimer = setTimeout(() => {
                            const v4 = document.getElementById('liveCamera');
                            if (v4 && state.stream) initFaceMeshWithRetry(v4, attempt + 1);
                        }, delay);
                    } else {
                        state.faceStatusText = '❌ face AI unavailable';
                        state.faceStatusDot = 'error';
                        updateFaceStatusUI();
                    }
                }
            }

            function getYaw(landmarks) {
                const leftEye = landmarks[33];
                const rightEye = landmarks[263];
                const noseTip = landmarks[1];
                if (!leftEye || !rightEye || !noseTip) return 0;
                const eyeMidX = (leftEye.x + rightEye.x) / 2;
                const diff = noseTip.x - eyeMidX;
                return diff * 100;
            }

            function updateFaceStatusUI() {
                const el = document.getElementById('faceStatus');
                if (el) {
                    const dot = document.querySelector('.face-status-dot');
                    if (dot) {
                        dot.className = `face-status-dot ${state.faceStatusDot}`;
                    }
                    el.innerHTML =
                        `${state.faceStatusText}`;
                }
                // Also update the proctor panel face status if it's a separate element
                const proctorEl = document.querySelector('#proctorPanel .face-status-text');
                if (proctorEl) {
                    proctorEl.textContent = state.faceStatusText;
                }
            }

            function timerTick() {
                if (state.stage !== 'exam' || state.submitted) return;
                state.timeLeft--;
                const timerEl = document.getElementById('timerDisplay');
                if (timerEl) {
                    timerEl.textContent = formatTime(state.timeLeft);
                    timerEl.style.color = state.timeLeft < 300 ? '#ef4444' : state.timeLeft < 600 ? '#f59e0b' :
                        '#10b981';
                }
                if (state.timeLeft <= 0) submitExam();
            }

            // ─── AUDIO NOISE ───────────────────────────────────────────
            function startNoiseMonitoring() {
                if (!state.stream) return;
                const audioTrack = state.stream.getAudioTracks()[0];
                if (!audioTrack) return;
                try {
                    const ctx = new(window.AudioContext || window.webkitAudioContext)();
                    const source = ctx.createMediaStreamSource(new MediaStream([audioTrack]));
                    const analyser = ctx.createAnalyser();
                    analyser.fftSize = 256;
                    source.connect(analyser);
                    state.audioContext = ctx;
                    state.analyser = analyser;

                    const bufferLength = analyser.frequencyBinCount;
                    const dataArray = new Uint8Array(bufferLength);

                    state.noiseCheckInterval = setInterval(() => {
                        if (state.stage !== 'exam' || state.submitted) return;
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
                        const avg = sum / bufferLength;
                        const noiseLevel = Math.min(100, Math.round((avg / 128) * 100));
                        updateNoiseMeter(noiseLevel);

                        if (noiseLevel > 60) {
                            if (!state.highNoiseSince) state.highNoiseSince = Date.now();
                            else if (Date.now() - state.highNoiseSince > 3000) {
                                addViolation('Excessive background noise');
                                state.highNoiseSince = null;
                            }
                        } else {
                            state.highNoiseSince = null;
                        }
                    }, 500);
                } catch (e) {
                    console.warn('Audio analysis failed', e);
                }
            }

            function updateNoiseMeter(level) {
                const fill = document.getElementById('noiseFill');
                if (fill) fill.style.width = level + '%';
                const label = document.getElementById('noiseLabel');
                if (label) label.textContent = level + '%';
            }

            // ─── OBSTRUCTION ───────────────────────────────────────────
            function startObstructionDetection() {
                if (!state.stream) return;
                const video = document.getElementById('liveCamera');
                if (!video) return;
                const canvas = document.createElement('canvas');
                canvas.width = 160;
                canvas.height = 120;
                const ctx = canvas.getContext('2d');
                state.canvasCtx = ctx;

                state.obstructionCheckInterval = setInterval(() => {
                    if (state.stage !== 'exam' || state.submitted) return;
                    try {
                        ctx.drawImage(video, 0, 0, 160, 120);
                        const frame = ctx.getImageData(0, 0, 160, 120);
                        let total = 0;
                        for (let i = 0; i < frame.data.length; i += 4) {
                            total += (frame.data[i] + frame.data[i + 1] + frame.data[i + 2]) / 3;
                        }
                        const avgBrightness = total / (frame.data.length / 4);

                        const dark = avgBrightness < 30;
                        const bright = avgBrightness > 240;

                        if (dark) {
                            if (!state.darkSince) state.darkSince = Date.now();
                            else if (Date.now() - state.darkSince > 4000) {
                                addViolation('Camera obstructed (too dark)');
                                state.darkSince = null;
                            }
                        } else { state.darkSince = null; }

                        if (bright) {
                            if (!state.brightSince) state.brightSince = Date.now();
                            else if (Date.now() - state.brightSince > 4000) {
                                addViolation('Camera obstructed (too bright)');
                                state.brightSince = null;
                            }
                        } else { state.brightSince = null; }

                        const brightnessEl = document.getElementById('brightnessVal');
                        if (brightnessEl) brightnessEl.textContent = Math.round(avgBrightness);
                    } catch (e) {
                        // Silently handle errors
                    }
                }, 5000);
            }

            // ─── VIOLATIONS ────────────────────────────────────────────
            function addViolation(msg) {
                state.violations++;
                const time = new Date().toLocaleTimeString('en-NG');
                state.violationLog.push({ time, message: msg });
                state.warningMsg =
                    `⚠️ Warning ${state.violations}/3: ${msg}${state.violations>=3?'\n\nExam submitted automatically.':''}`;
                state.showWarning = true;
                showViolationModal();
                const badge = document.querySelector('.violation-badge');
                if (badge) badge.textContent = `${state.violations}/3`;
                if (state.violations >= 3) setTimeout(submitExam, 2000);
            }

            function showViolationModal() {
                const existing = document.querySelector('.modal-overlay');
                if (existing) existing.remove();
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
              <div class="modal-box" style="border:2px solid #ef4444;">
                <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
                <h3 style="color:#ef4444;">Malpractice Detected</h3>
                <p style="color:#fca5a5;white-space:pre-line;">${state.warningMsg}</p>
                ${state.violations < 3 ? '<button id="closeWarning" class="btn-purple">I Understand, Continue</button>' : ''}
              </div>`;
                document.body.appendChild(overlay);
                document.getElementById('closeWarning')?.addEventListener('click', () => {
                    overlay.remove();
                    state.showWarning = false;
                });
            }

            // ─── EXAM PAGE ────────────────────────────────────────────
            function renderExam() {
                if (!state.questions.length) return;
                const q = state.questions[state.current];
                const answeredCount = Object.keys(state.answers).length;

                const container = document.createElement('div');
                container.style.cssText = 'display:flex;flex-direction:column;min-height:100vh;';
                container.innerHTML = `
              <div style="background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(124,58,237,0.3);position:sticky;top:0;z-index:100;">
                <div style="font-size:13px;color:#94a3b8;">👤 ${state.candidate.name}</div>
                <div id="timerDisplay" class="timer" style="color:${state.timeLeft<300?'#ef4444':state.timeLeft<600?'#f59e0b':'#10b981'};">⏱ ${formatTime(state.timeLeft)}</div>
                <div style="display:flex;gap:8px;">
                  <button id="toggleCalcBtn" style="background:rgba(124,58,237,0.3);color:#a78bfa;padding:6px 12px;border-radius:6px;font-size:13px;">🧮</button>
                  <button id="submitExamBtn" style="background:rgba(239,68,68,0.2);color:#fca5a5;padding:6px 12px;border-radius:6px;font-size:13px;">Submit</button>
                </div>
              </div>
              <div style="display:flex;flex:1;" class="exam-layout">
                <div class="sidebar" style="width:220px;background:rgba(0,0,0,0.3);border-right:1px solid rgba(124,58,237,0.2);padding:16px;overflow-y:auto;">
                  <div style="font-size:12px;color:#a78bfa;font-weight:700;margin-bottom:12px;">Question Palette</div>
                  <div id="paletteGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px;">
                    ${state.questions.map((q2,i) => {
                      let cls = 'palette-btn';
                      if (state.answers[q2.id]) cls += ' answered';
                      if (state.flagged.has(q2.id)) cls += ' flagged';
                      if (i === state.current) cls += ' current';
                      return `<button class="${cls}" data-index="${i}">${i+1}</button>`;
                    }).join('')}
                  </div>
                  <div class="proctor-panel" id="proctorPanel">
                    <div>📷 Camera: <span id="camStatusProctor">🟢</span></div>
                    <div>🎤 Mic: <span id="micStatusProctor">🟢</span></div>
                    <div>🌐 Internet: <span id="netStatusProctor">🟢</span></div>
                    <div>🔊 Noise: <span id="noiseLabel">0%</span>
                      <div class="noise-bar"><div id="noiseFill" class="noise-fill" style="width:0%"></div></div>
                    </div>
                    <div>💡 Brightness: <span id="brightnessVal">--</span></div>
                    <div>
                      <span class="face-status-dot ${state.faceStatusDot}"></span>
                      <span id="faceStatus" class="face-status-text">${state.faceStatusText}</span>
                    </div>
                    <div style="margin-top:6px; font-size:10px; color:#ef4444;">Violations: <span class="violation-badge">${state.violations}/3</span></div>
                  </div>
                </div>
                <div style="flex:1;padding:24px;overflow-y:auto;">
                  <div style="margin-bottom:16px;">
                    <div style="display:flex;justify-content:space-between;font-size:13px;color:#94a3b8;margin-bottom:6px;">
                      <span>Question ${state.current+1} of ${state.questions.length}</span>
                      <span>${answeredCount} answered</span>
                    </div>
                    <div style="background:rgba(255,255,255,0.1);border-radius:99px;height:6px;">
                      <div style="background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:99px;height:100%;width:${((state.current+1)/state.questions.length)*100}%;"></div>
                    </div>
                  </div>
                  <div style="display:inline-block;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.4);border-radius:99px;padding:4px 12px;font-size:12px;color:#a78bfa;font-weight:700;margin-bottom:16px;">
                    ${q.subject} · ${q.type === 'mcq' ? 'Multiple Choice' : 'Short Answer'}
                  </div>
                  <div class="card" style="margin-bottom:20px;">
                    <p style="margin:0;font-size:17px;line-height:1.7;font-weight:500;">${q.question}</p>
                  </div>
                  ${q.type === 'mcq' ? `
                    <div style="display:flex;flex-direction:column;gap:10px;" id="optionsContainer">
                      ${q.options.map((opt, i) => {
                        const selected = state.answers[q.id] === opt;
                        return `<button class="option-btn" data-opt="${opt.replace(/"/g,'&quot;')}" style="padding:14px 20px;border-radius:10px;border:2px solid ${selected?'#7c3aed':'rgba(255,255,255,0.1)'};background:${selected?'rgba(124,58,237,0.25)':'rgba(255,255,255,0.04)'};color:${selected?'#a78bfa':'#cbd5e1'};text-align:left;font-size:15px;display:flex;align-items:center;gap:12px;">
                          <span style="width:28px;height:28px;border-radius:50%;background:${selected?'#7c3aed':'rgba(255,255,255,0.1)'};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;">${String.fromCharCode(65+i)}</span> ${opt}
                        </button>`;
                      }).join('')}
                    </div>`
                  : `
                    <div>
                      <label class="label">Your Answer</label>
                      <input style="background:rgba(255,255,255,0.07);border:1px solid rgba(124,58,237,0.4);color:#e2e8f0;padding:12px 16px;border-radius:10px;font-size:16px;width:100%;outline:none;" placeholder="Type your answer here..." id="saqInput" value="${state.answers[q.id] || ''}">
                      <p style="margin:8px 0 0;font-size:12px;color:#64748b;">Follow the question's format exactly.</p>
                    </div>`
                  }
                  <div style="display:flex;justify-content:space-between;margin-top:24px;gap:10px;">
                    <button id="prevBtn" ${state.current===0?'disabled':''} style="background:rgba(255,255,255,0.08);color:${state.current===0?'#334155':'#e2e8f0'};padding:14px 20px;border-radius:10px;">← Previous</button>
                    <button id="flagBtn" style="background:${state.flagged.has(q.id)?'rgba(245,158,11,0.2)':'rgba(255,255,255,0.08)'};color:${state.flagged.has(q.id)?'#f59e0b':'#94a3b8'};padding:14px 20px;border-radius:10px;">${state.flagged.has(q.id)?'🚩 Unflag':'🏳️ Flag'}</button>
                    ${state.current < state.questions.length-1 ? 
                      `<button id="nextBtn" class="btn-purple" style="padding:14px 20px;border-radius:10px;">Next →</button>` :
                      `<button id="submitExamBtnMain" style="background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:14px 20px;border-radius:10px;">✅ Submit Exam</button>`
                    }
                  </div>
                </div>
                ${state.stream ? `
                <div style="width:160px;background:rgba(0,0,0,0.4);border-left:1px solid rgba(124,58,237,0.2);padding:12px;display:flex;flex-direction:column;gap:8px;">
                  <div style="font-size:11px;color:#a78bfa;font-weight:700;text-align:center;">📹 LIVE</div>
                  <video id="liveCamera" autoplay muted playsinline style="width:100%;border-radius:8px;border:1px solid rgba(124,58,237,0.4);object-fit:cover;aspect-ratio:4/3;"></video>
                  <div style="font-size:10px;color:#64748b;text-align:center;">You are being monitored</div>
                </div>` : ''}
              </div>
            `;

                root.appendChild(container);

                if (q.type === 'mcq') {
                    document.querySelectorAll('.option-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            state.answers[q.id] = btn.dataset.opt;
                            render();
                        });
                    });
                } else {
                    document.getElementById('saqInput').addEventListener('input', e => {
                        state.answers[q.id] = e.target.value;
                    });
                }

                document.getElementById('prevBtn')?.addEventListener('click', () => {
                    if (state.current > 0) { state.current--;
                        render(); }
                });
                document.getElementById('nextBtn')?.addEventListener('click', () => {
                    if (state.current < state.questions.length - 1) { state.current++;
                        render(); }
                });
                document.getElementById('flagBtn').addEventListener('click', () => {
                    if (state.flagged.has(q.id)) state.flagged.delete(q.id);
                    else state.flagged.add(q.id);
                    render();
                });
                document.getElementById('submitExamBtn')?.addEventListener('click', submitExam);
                document.getElementById('submitExamBtnMain')?.addEventListener('click', submitExam);
                document.getElementById('toggleCalcBtn')?.addEventListener('click', openCalculator);

                document.querySelectorAll('.palette-btn').forEach(btn => {
                    btn.addEventListener('click', e => {
                        const idx = parseInt(e.target.dataset.index);
                        state.current = idx;
                        render();
                    });
                });

                if (state.stream) {
                    const liveVideo = document.getElementById('liveCamera');
                    if (liveVideo) {
                        liveVideo.srcObject = state.stream;
                        liveVideo.play().catch(() => {});
                    }
                }

                // Re-attempt face mesh if not already initialized
                if (state.stream && !state.submitted) {
                    const newVideo = document.getElementById('liveCamera');
                    if (newVideo && !state.faceInitDone && !state.faceInitError) {
                        // If face mesh hasn't initialized yet, try again
                        if (state.faceMeshRetryTimer) {
                            clearTimeout(state.faceMeshRetryTimer);
                            state.faceMeshRetryTimer = null;
                        }
                        setTimeout(() => {
                            const v = document.getElementById('liveCamera');
                            if (v && state.stream && !state.faceInitDone) {
                                initFaceMeshWithRetry(v, state.faceInitAttempts);
                            }
                        }, 500);
                    } else if (newVideo && state.faceInitError) {
                        // If we had an error, try one more time after a delay
                        if (!state.faceMeshRetryTimer) {
                            state.faceMeshRetryTimer = setTimeout(() => {
                                const v = document.getElementById('liveCamera');
                                if (v && state.stream) {
                                    state.faceInitError = null;
                                    initFaceMeshWithRetry(v, 0);
                                }
                                state.faceMeshRetryTimer = null;
                            }, 3000);
                        }
                    }
                }

                updateProctorPanel();
                // Update face status UI
                updateFaceStatusUI();
            }

            function updateProctorPanel() {
                const camEl = document.getElementById('camStatusProctor');
                const micEl = document.getElementById('micStatusProctor');
                const netEl = document.getElementById('netStatusProctor');
                if (camEl) camEl.textContent = state.checks.camera ? '🟢' : '🔴';
                if (micEl) micEl.textContent = state.checks.mic ? '🟢' : '🔴';
                if (netEl) netEl.textContent = state.internetOnline ? '🟢' : '🔴';
            }

            // ─── CALCULATOR ────────────────────────────────────────────
            function openCalculator() {
                if (state.showCalc) return;
                state.showCalc = true;
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.id = 'calcOverlay';
                overlay.innerHTML = `
              <div class="modal-box" style="max-width:240px;">
                <div class="calc-display" id="calcDisplay">0</div>
                <div class="calc-grid">
                  <button class="calc-btn calc-clear" data-val="C">C</button>
                  <button class="calc-btn calc-op" data-val="/">÷</button>
                  <button class="calc-btn calc-op" data-val="*">×</button>
                  <button class="calc-btn calc-op" data-val="-">−</button>
                  <button class="calc-btn" data-val="7">7</button>
                  <button class="calc-btn" data-val="8">8</button>
                  <button class="calc-btn" data-val="9">9</button>
                  <button class="calc-btn calc-op" data-val="+">+</button>
                  <button class="calc-btn" data-val="4">4</button>
                  <button class="calc-btn" data-val="5">5</button>
                  <button class="calc-btn" data-val="6">6</button>
                  <button class="calc-btn calc-op" data-val="=">=</button>
                  <button class="calc-btn" data-val="1">1</button>
                  <button class="calc-btn" data-val="2">2</button>
                  <button class="calc-btn" data-val="3">3</button>
                  <button class="calc-btn" data-val="0" style="grid-column:span 2;">0</button>
                  <button class="calc-btn" data-val=".">.</button>
                </div>
                <button id="closeCalcBtn" style="margin-top:12px;width:100%;background:#ef4444;color:#fff;padding:10px;border-radius:8px;">Close</button>
              </div>`;
                document.body.appendChild(overlay);

                let calcDisplay = '0',
                    calcPrev = null,
                    calcOp = null,
                    calcFresh = false;
                const updateDisplay = () => document.getElementById('calcDisplay').textContent = calcDisplay;

                overlay.querySelectorAll('[data-val]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const val = btn.dataset.val;
                        if (val === 'C') { calcDisplay = '0';
                            calcPrev = null;
                            calcOp = null;
                            calcFresh = false; } else if (val === '=') {
                            if (calcOp && calcPrev !== null) {
                                const a = parseFloat(calcPrev),
                                    b = parseFloat(calcDisplay);
                                let r;
                                switch (calcOp) {
                                    case '+':
                                        r = a + b;
                                        break;
                                    case '-':
                                        r = a - b;
                                        break;
                                    case '*':
                                        r = a * b;
                                        break;
                                    case '/':
                                        r = b === 0 ? 'Error' : a / b;
                                        break;
                                    default:
                                        r = b;
                                }
                                calcDisplay = r === 'Error' ? 'Error' : String(parseFloat(r.toFixed(8)));
                                calcPrev = null;
                                calcOp = null;
                                calcFresh = true;
                            }
                        } else if (['+', '-', '*', '/'].includes(val)) {
                            calcPrev = calcDisplay;
                            calcOp = val;
                            calcFresh = true;
                        } else {
                            if (val === '.' && calcDisplay.includes('.')) return;
                            calcDisplay = (calcDisplay === '0' || calcFresh) ? (val === '.' ? '0.' : val) :
                                calcDisplay + val;
                            calcFresh = false;
                        }
                        updateDisplay();
                    });
                });

                document.getElementById('closeCalcBtn').addEventListener('click', () => {
                    overlay.remove();
                    state.showCalc = false;
                });
            }

            // ─── SUBMIT ────────────────────────────────────────────────
            function submitExam() {
                if (state.submitted) return;
                state.submitted = true;
                clearInterval(state.timerInterval);
                clearInterval(state.noiseCheckInterval);
                clearInterval(state.obstructionCheckInterval);
                state.faceMeshRunning = false;
                if (state.faceMesh) { state.faceMesh.close();
                    state.faceMesh = null; }
                if (state.stream) state.stream.getTracks().forEach(t => t.stop());

                const results = calcResults();
                const timeUsedSec = 30 * 60 - state.timeLeft;
                const timeUsedStr = `${Math.floor(timeUsedSec/60)}m ${timeUsedSec%60}s`;

                const violationText = state.violationLog.length ?
                    state.violationLog.map(v => `[${v.time}] ${v.message}`).join('\n') :
                    'None';

                const templateParams = {
                    candidate_name: state.candidate.name,
                    candidate_email: state.candidate.email,
                    candidate_phone: state.candidate.phone,
                    candidate_nin: '',
                    score: results.score,
                    total: results.total,
                    percentage: results.pct,
                    time_used: timeUsedStr,
                    violations: state.violations,
                    violation_log: violationText,
                    exam_date: new Date().toLocaleString('en-NG', { dateStyle: 'full', timeStyle: 'short' }),
                    to_email: ADMIN_EMAIL,
                };

                if (window.emailjs) {
                    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
                        .then(() => console.log('✅ Result emailed'))
                        .catch(err => console.warn('Email error:', err));
                }

                state.stage = 'result';
                render();
            }

            function calcResults() {
                let correct = 0,
                    unanswered = 0;
                state.questions.forEach(q => {
                    const a = state.answers[q.id];
                    if (!a) { unanswered++; return; }
                    if (a.trim().toLowerCase() === q.answer.trim().toLowerCase()) correct++;
                });
                return {
                    score: correct,
                    total: state.questions.length,
                    pct: Math.round((correct / state.questions.length) * 100),
                    unanswered,
                    wrong: state.questions.length - correct - unanswered,
                };
            }

            // ─── RESULT ─────────────────────────────────────────────────
            function renderResult() {
                const { score, total, pct, unanswered, wrong } = calcResults();
                const timeUsedSec = 30 * 60 - state.timeLeft;
                const timeUsedStr = `${Math.floor(timeUsedSec/60)}m ${timeUsedSec%60}s`;
                const pass = pct >= 50;

                const div = document.createElement('div');
                div.style.cssText =
                    'display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;';
                div.innerHTML = `
              <div class="card" style="width:100%;max-width:520px;text-align:center;">
                <div style="font-size:60px;margin-bottom:8px;">${pass ? '🎉' : '📚'}</div>
                <h2 style="margin:0 0 4px;font-size:26px;font-weight:800;color:${pass?'#10b981':'#ef4444'};">${pass ? 'PASS' : 'FAIL'}</h2>
                <p style="color:#64748b;margin-bottom:24px;">2026 UNILAG Post-UTME Practice Result</p>
                <div style="width:120px;height:120px;border-radius:50%;background:conic-gradient(${pass?'#10b981':'#ef4444'} ${pct*3.6}deg, rgba(255,255,255,0.1) 0deg);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
                  <div style="width:96px;height:96px;border-radius:50%;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                    <span style="font-size:24px;font-weight:800;color:${pass?'#10b981':'#ef4444'};">${pct}%</span>
                    <span style="font-size:11px;color:#64748b;">${score}/${total}</span>
                  </div>
                </div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;">
                  ${[['✅ Correct', score, '#10b981'], ['❌ Wrong', wrong, '#ef4444'], ['⏭️ Skipped', unanswered, '#f59e0b'], ['⏱ Time Used', timeUsedStr, '#a78bfa'], ['⚠️ Violations', state.violations, '#ef4444'], ['📝 Questions', total, '#7c3aed']]
                    .map(([lbl,val,col]) => `<div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:12px 8px;"><div style="font-size:11px;color:#64748b;">${lbl}</div><div style="font-size:20px;font-weight:800;color:${col};">${val}</div></div>`).join('')}
                </div>
                <div style="background:rgba(124,58,237,0.1);border-radius:10px;padding:12px 16px;margin-bottom:24px;font-size:14px;color:#cbd5e1;text-align:left;">
                  <div><strong style="color:#a78bfa;">Name:</strong> ${state.candidate.name}</div>
                  <div><strong style="color:#a78bfa;">Email:</strong> ${state.candidate.email}</div>
                  <div><strong style="color:#a78bfa;">Date:</strong> ${new Date().toLocaleDateString('en-NG',{dateStyle:'full'})}</div>
                </div>
                <button id="restartBtn" class="btn-purple" style="width:100%;">🔄 Start New Session</button>
              </div>
            `;
                root.appendChild(div);
                document.getElementById('restartBtn').addEventListener('click', () => {
                    clearInterval(state.noiseCheckInterval);
                    clearInterval(state.obstructionCheckInterval);
                    state.faceMeshRunning = false;
                    if (state.faceMesh) { state.faceMesh.close();
                        state.faceMesh = null; }
                    if (state.stream) { state.stream.getTracks().forEach(t => t.stop());
                        state.stream = null; }
                    state.stage = 'login';
                    state.candidate = { name: '', email: '', phone: '', pin: '' };
                    state.agreed = false;
                    state.checks = { internet: navigator.onLine, camera: false, mic: false, fullscreen: false };
                    state.faceInitDone = false;
                    state.faceInitError = null;
                    state.faceStatusText = '⏳ initializing…';
                    state.faceStatusDot = 'loading';
                    render();
                });
            }

            // ─── ANTI-CHEAT ────────────────────────────────────────────
            window.addEventListener('blur', () => {
                if (state.stage === 'exam' && !state.submitted) addViolation('Left exam window');
            });
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('selectstart', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (state.stage !== 'exam') return;
                if (e.key === 'F12' || (e.ctrlKey && ['u', 'U', 'c', 'C', 'v', 'V', 'x', 'X', 'i', 'I', 'j', 'J', 's',
                        'S', 'p', 'P'
                    ].includes(e.key)) || (e.ctrlKey && e.shiftKey)) {
                    e.preventDefault();
                    addViolation('Forbidden key combination');
                }
            });

            // ─── INIT ───────────────────────────────────────────────────
            render();

            // Also, ensure face status is updated periodically
            setInterval(() => {
                if (state.stage === 'exam' && !state.submitted) {
                    updateFaceStatusUI();
                    updateProctorPanel();
                }
            }, 2000);

        })();
    </script>
</body>
</html>
